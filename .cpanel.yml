---
# cPanel Git Version Control — auto-deploy
#
# Déclenché par cPanel → Git Version Control → "Update from Remote" puis
# "Deploy HEAD Commit". Pas besoin de SSH/Terminal.
#
# Pré-requis :
#   - PHP 8.5 actif via cPanel PHP Selector (php → /usr/local/bin/php → 8.5)
#   - composer disponible dans $PATH (déjà OK sur o2switch)
#   - Variables de session héritées via `bash -lc`
#
# Le repo est cloné dans /home/<user>/app.larecreetech.com/larecree
# (= $DEPLOYPATH). cPanel exécute chaque task depuis $HOME → on cd à chaque fois.
deployment:
  tasks:
    - export DEPLOYPATH=/home/sora3439/app.larecreetech.com/larecree
    - /bin/bash -lc "cd $DEPLOYPATH && composer install --no-dev --optimize-autoloader --no-interaction"
    - /bin/bash -lc "cd $DEPLOYPATH && php bin/console cache:clear --env=prod --no-interaction"
    - /bin/bash -lc "cd $DEPLOYPATH && php bin/console cache:warmup --env=prod"
    - /bin/bash -lc "cd $DEPLOYPATH && php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration"
    - /bin/bash -lc "cd $DEPLOYPATH && php bin/console importmap:install --env=prod"
    - /bin/bash -lc "cd $DEPLOYPATH && php bin/console asset-map:compile --env=prod"
    - /bin/bash -lc "cd $DEPLOYPATH && chmod -R 775 var/"
