; Limites PHP pour l'upload de vidéos depuis l'admin (o2switch PHP-FPM lit ce fichier).
; Ajuste selon le plan o2switch. Pour les très gros fichiers, préfère le dépôt FTP dans private/videos/.
upload_max_filesize = 1024M
post_max_size = 1024M
max_execution_time = 600
max_input_time = 600
memory_limit = 512M
